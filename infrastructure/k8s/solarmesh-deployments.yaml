apiVersion: apps/v1
kind: Deployment
metadata:
  name: core-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: core-api
  template:
    metadata:
      labels:
        app: core-api
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '3000'
        prometheus.io/path: '/metrics'
    spec:
      containers:
      - name: core-api
        image: solarmesh/core-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: DB_HOST
          value: "postgres-service"
        - name: REDPANDA_BROKER
          value: "redpanda-service:9092"
        - name: REDIS_URL
          value: "redis://redis-service:6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trading-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: trading-engine
  template:
    metadata:
      labels:
        app: trading-engine
    spec:
      containers:
      - name: trading-engine
        image: solarmesh/trading-engine:latest
        env:
        - name: REDPANDA_BROKER
          value: "redpanda-service:9092"
        - name: REDIS_URL
          value: "redis-service:6379"
